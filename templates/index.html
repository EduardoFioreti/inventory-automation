<!DOCTYPE html>
<html>
<head><title>Sistema Luiz Eduardo</title></head>
<body>
    <h2>Cadastro de Peças</h2>
    <form action="/cadastrar" method="POST">
        <input type="text" id="id_codigo" name="codigo" placeholder="Código" required><br><br>
        <input type="text" id="id_marca" name="marca" placeholder="Marca"><br><br>
        <button type="submit" id="btn_enviar">Enviar</button>
    </form>
    <hr>
    <h3>Itens no Sistema:</h3>
    <ul>
        {% for p in lista %}
            <li>{{ p.codigo }} - {{ p.marca }}</li>
        {% endfor %}
    </ul>
</body>
</html>
